description "Vitcoin Core Daemon"

start on runlevel [2345]
stop on starting rc RUNLEVEL=[016]

env VTCCOIND_BIN="/usr/bin/vitcoind"
env VTCCOIND_USER="vitcoin"
env VTCCOIND_GROUP="vitcoin"
env VTCCOIND_PIDDIR="/var/run/vitcoind"
# upstart can't handle variables constructed with other variables
env VTCCOIND_PIDFILE="/var/run/vitcoind/vitcoind.pid"
env VTCCOIND_CONFIGFILE="/etc/vitcoin/vitcoin.conf"
env VTCCOIND_DATADIR="/var/lib/vitcoind"

expect fork

respawn
respawn limit 5 120
kill timeout 60

pre-start script
    # this will catch non-existent config files
    # vitcoind will check and exit with this very warning, but it can do so
    # long after forking, leaving upstart to think everything started fine.
    # since this is a commonly encountered case on install, just check and
    # warn here.
    if ! grep -qs '^rpcpassword=' "$VTCCOIND_CONFIGFILE" ; then
        echo "ERROR: You must set a secure rpcpassword to run vitcoind."
        echo "The setting must appear in $VTCCOIND_CONFIGFILE"
        echo
        echo "This password is security critical to securing wallets "
        echo "and must not be the same as the rpcuser setting."
        echo "You can generate a suitable random password using the following"
        echo "command from the shell:"
        echo
        echo "bash -c 'tr -dc a-zA-Z0-9 < /dev/urandom | head -c32 && echo'"
        echo
        echo "It is also recommended that you also set alertnotify so you are "
        echo "notified of problems:"
        echo
        echo "ie: alertnotify=echo %%s | mail -s \"Vitcoin Alert\"" \
            "admin@foo.com"
        echo
        exit 1
    fi

    mkdir -p "$VTCCOIND_PIDDIR"
    chmod 0755 "$VTCCOIND_PIDDIR"
    chown $VTCCOIND_USER:$VTCCOIND_GROUP "$VTCCOIND_PIDDIR"
    chown $VTCCOIND_USER:$VTCCOIND_GROUP "$VTCCOIND_CONFIGFILE"
    chmod 0660 "$VTCCOIND_CONFIGFILE"
end script

exec start-stop-daemon \
    --start \
    --pidfile "$VTCCOIND_PIDFILE" \
    --chuid $VTCCOIND_USER:$VTCCOIND_GROUP \
    --exec "$VTCCOIND_BIN" \
    -- \
    -pid="$VTCCOIND_PIDFILE" \
    -conf="$VTCCOIND_CONFIGFILE" \
    -datadir="$VTCCOIND_DATADIR" \
    -disablewallet \
    -daemon

